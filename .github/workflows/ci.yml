name: CI Automation Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'  # Run daily at 2 AM UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chrome, firefox]
      fail-fast: false

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Chrome
      if: matrix.browser == 'chrome'
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: stable

    - name: Install Firefox
      if: matrix.browser == 'firefox'
      uses: browser-actions/setup-firefox@v1
      with:
        firefox-version: latest

    - name: Run tests
      env:
        BROWSER: ${{ matrix.browser }}
        HEADLESS: true
      run: |
        pytest tests/ \
          -v \
          --tb=short \
          --maxfail=5 \
          -n auto \
          --html=reports/report_${{ matrix.browser }}.html \
          --self-contained-html

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.browser }}
        path: |
          reports/
          screenshots/
        retention-days: 30

    - name: Upload test report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: html-report-${{ matrix.browser }}
        path: reports/*.html
        retention-days: 30

    - name: Publish test summary
      if: always()
      run: |
        if [ -f reports/history/index.json ]; then
          echo "## Test Results - ${{ matrix.browser }}" >> $GITHUB_STEP_SUMMARY
          python -c "
import json
with open('reports/history/index.json') as f:
    data = json.load(f)
    if data:
        run = data[0]
        print(f\"- **Total**: {run['total']}\", file=open('$GITHUB_STEP_SUMMARY', 'a'))
        print(f\"- **Passed**: {run['passed']} ✅\", file=open('$GITHUB_STEP_SUMMARY', 'a'))
        print(f\"- **Failed**: {run['failed']} ❌\", file=open('$GITHUB_STEP_SUMMARY', 'a'))
        print(f\"- **Errors**: {run['error']} ⚠️\", file=open('$GITHUB_STEP_SUMMARY', 'a'))
        print(f\"- **Pass Rate**: {run['pass_rate']}%\", file=open('$GITHUB_STEP_SUMMARY', 'a'))
        print(f\"- **Duration**: {run['duration']}s\", file=open('$GITHUB_STEP_SUMMARY', 'a'))
          "
        fi

  notify:
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
    - name: Check test status
      run: |
        if [ "${{ needs.test.result }}" == "failure" ]; then
          echo "Tests failed!"
          exit 1
        else
          echo "Tests passed!"
        fi
