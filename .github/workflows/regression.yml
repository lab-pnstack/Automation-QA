name: Scheduled Regression Tests

on:
  schedule:
    - cron: '0 0 * * 1-5'  # Weekdays at midnight UTC
  workflow_dispatch:

jobs:
  regression:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Chrome and ChromeDriver
      run: |
        # Install Chrome
        wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

        # Install matching ChromeDriver
        CHROME_VERSION=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+')
        CHROMEDRIVER_VERSION=$(curl -s "https://googlechromelabs.github.io/chrome-for-testing/latest-patch-versions-per-build-with-downloads.json" | jq -r ".builds.\"${CHROME_VERSION}\".version")
        wget -q "https://storage.googleapis.com/chrome-for-testing-public/${CHROMEDRIVER_VERSION}/linux64/chromedriver-linux64.zip"
        unzip -q chromedriver-linux64.zip
        sudo mv chromedriver-linux64/chromedriver /usr/local/bin/chromedriver
        sudo chmod +x /usr/local/bin/chromedriver
        chromedriver --version

    - name: Run full regression suite
      env:
        BROWSER: chrome
        HEADLESS: true
      run: |
        pytest tests/ \
          -v \
          --tb=line \
          -n auto \
          --dist loadgroup \
          --html=reports/regression_report.html \
          --self-contained-html

    - name: Upload regression results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: regression-test-results
        path: |
          reports/
          screenshots/
        retention-days: 90

    - name: Generate test summary
      if: always()
      run: |
        echo "# Regression Test Summary" >> $GITHUB_STEP_SUMMARY
        if [ -f reports/history/index.json ]; then
          python3 << 'EOF' >> $GITHUB_STEP_SUMMARY
import json
with open('reports/history/index.json') as f:
    data = json.load(f)
    if data:
        run = data[0]
        status = "✅ PASSED" if run['failed'] == 0 and run['error'] == 0 else "❌ FAILED"
        print(f"\n## {status}\n")
        print(f"| Metric | Value |")
        print(f"|--------|-------|")
        print(f"| Total Tests | {run['total']} |")
        print(f"| Passed | {run['passed']} ✅ |")
        print(f"| Failed | {run['failed']} ❌ |")
        print(f"| Errors | {run['error']} ⚠️ |")
        print(f"| Skipped | {run['skipped']} ⏭️ |")
        print(f"| Pass Rate | {run['pass_rate']}% |")
        print(f"| Duration | {run['duration']}s |")
        print(f"| Run ID | `{run['run_id']}` |")
EOF
        fi
