name: Parallel Test Execution

on:
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - authentication
          - product
          - cart
          - checkout

jobs:
  parallel-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Chrome and ChromeDriver
      run: |
        # Install Chrome
        wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

        # Install matching ChromeDriver
        CHROME_VERSION=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+')
        CHROMEDRIVER_VERSION=$(curl -s "https://googlechromelabs.github.io/chrome-for-testing/latest-patch-versions-per-build-with-downloads.json" | jq -r ".builds.\"${CHROME_VERSION}\".version")
        wget -q "https://storage.googleapis.com/chrome-for-testing-public/${CHROMEDRIVER_VERSION}/linux64/chromedriver-linux64.zip"
        unzip -q chromedriver-linux64.zip
        sudo mv chromedriver-linux64/chromedriver /usr/local/bin/chromedriver
        sudo chmod +x /usr/local/bin/chromedriver
        chromedriver --version

    - name: Run tests in parallel
      env:
        BROWSER: chrome
        HEADLESS: true
      run: |
        case "${{ github.event.inputs.test_suite }}" in
          authentication)
            pytest tests/test_login.py -v -n auto
            ;;
          product)
            pytest tests/test_search_product.py -v -n auto
            ;;
          cart)
            pytest tests/test_add_to_cart.py -v -n auto
            ;;
          checkout)
            pytest tests/test_checkout.py -v -n auto
            ;;
          all)
            pytest tests/ -v -n auto --dist loadgroup
            ;;
        esac

    - name: Upload results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: parallel-test-results
        path: |
          reports/
          screenshots/
        retention-days: 14
